version: '3.8'

services:
  house-price-api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./house_price_model.pkl:/app/house_price_model.pkl:ro
      - ./house_price_model_metadata.pkl:/app/house_price_model_metadata.pkl:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s